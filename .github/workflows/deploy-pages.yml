name: Deploy Catalog Site

on:
  push:
    branches: [ main, master ]
    paths:
      - 'Mods/**'
      - 'mods/**'
      - 'Index/**'
      - 'index/**'
      - 'assets/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build static catalog
        shell: bash
        run: |
          python <<'PY'
          import html
          import json
          import shutil
          from pathlib import Path
          import os

          ROOT = Path('.')
          SITE = ROOT / '_site'
          PLACEHOLDER_NAMES = {'ExampleCommunityMod'}
          PLACEHOLDER_SLUGS = {'example-community-mod'}

          REPO = f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}"
          REF = os.environ.get('GITHUB_REF_NAME', 'main')

          def choose_existing_dir(preferred: str, alternate: str) -> Path:
              preferred_path = ROOT / preferred
              alternate_path = ROOT / alternate

              if preferred_path.exists() and alternate_path.exists():
                  raise SystemExit(f"Both '{preferred}/' and '{alternate}/' exist. Keep only one casing.")

              if preferred_path.exists():
                  return preferred_path
              if alternate_path.exists():
                  return alternate_path
              return preferred_path

          MODS = choose_existing_dir('Mods', 'mods')
          INDEX_DIR = choose_existing_dir('Index', 'index')
          INDEX = INDEX_DIR / 'mods.json'
          ASSETS = ROOT / 'assets'

          mods_label = MODS.name
          index_label = INDEX_DIR.name

          if SITE.exists():
              shutil.rmtree(SITE)
          SITE.mkdir(parents=True, exist_ok=True)

          entries = []
          if INDEX.is_file():
              entries = json.loads(INDEX.read_text(encoding='utf-8'))

          cards = []
          for entry in entries:
              if not isinstance(entry, dict):
                  continue

              name = str(entry.get('name', '')).strip()
              slug = str(entry.get('slug', '')).strip()
              if name in PLACEHOLDER_NAMES or slug in PLACEHOLDER_SLUGS:
                  continue

              summary = str(entry.get('summary', '')).strip()
              preview_path = str(entry.get('preview_path', '')).replace('\\', '/').strip()
              readme_path = str(entry.get('readme_path', '')).replace('\\', '/').strip()
              official = bool(entry.get('official', False))
              author = html.escape(str(entry.get('author', 'Unknown')).strip())

              blob_readme_url = f"{REPO}/blob/{REF}/{readme_path}" if readme_path else REPO

              source_repo = ''
              releases_url = ''
              tags_html = ''

              mod_json_path = MODS / name / 'mod.json'
              if mod_json_path.is_file():
                  try:
                      mod_data = json.loads(mod_json_path.read_text(encoding='utf-8'))
                      source_repo = str(mod_data.get('source_repo', '')).strip()
                      releases_url = str(mod_data.get('releases_url', '')).strip()
                      tags = mod_data.get('tags', []) if isinstance(mod_data.get('tags', []), list) else []
                      tags_html = ''.join(f'<span class="tag">{html.escape(str(t))}</span>' for t in tags)
                  except Exception:
                      pass

              cards.append(f"""
              <article class="card">
                <div class="media">
                  <img src="{html.escape(preview_path)}" alt="{html.escape(name)} preview" loading="lazy">
                </div>
                <div class="content">
                  <div class="heading">
                    <h2>{html.escape(name)}</h2>
                    <span class="badge {'official' if official else 'community'}">{'Official' if official else 'Community'}</span>
                  </div>
                  <p class="author">By {author}</p>
                  <p>{html.escape(summary)}</p>
                  <div class="tags">{tags_html}</div>
                  <div class="links">
                    <a href="{html.escape(blob_readme_url)}">README</a>
                    {f'<a href="{html.escape(source_repo)}">Source</a>' if source_repo else ''}
                    {f'<a href="{html.escape(releases_url)}">Releases</a>' if releases_url else ''}
                  </div>
                </div>
              </article>
              """)

          if MODS.exists():
              shutil.copytree(MODS, SITE / 'mods', dirs_exist_ok=True)

          if INDEX_DIR.exists():
              shutil.copytree(INDEX_DIR, SITE / 'index', dirs_exist_ok=True)

          if ASSETS.exists():
              shutil.copytree(ASSETS, SITE / 'assets', dirs_exist_ok=True)

          body = '\n'.join(cards) if cards else '<p class="empty">No community mods have been published yet. Submit the first one!</p>'

          html_text = f"""<!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>CastleForge Community Mods</title>
            <style>
              :root {{ color-scheme: dark; --bg:#0b1020; --panel:#141b2d; --text:#e8ecf3; --muted:#9aa7bd; --accent:#6ea8fe; --line:#23304a; }}
              * {{ box-sizing:border-box; }}
              body {{ margin:0; font-family:Segoe UI, Arial, sans-serif; background:linear-gradient(180deg,#0b1020,#11182a); color:var(--text); }}
              .wrap {{ max-width:1200px; margin:0 auto; padding:40px 20px 64px; }}
              header {{ margin-bottom:28px; }}
              .brand {{ max-width:420px; margin:0 0 18px; display:block; }}
              h1 {{ margin:0 0 10px; font-size:clamp(2rem,4vw,3rem); }}
              p.lead {{ color:var(--muted); max-width:850px; line-height:1.6; }}
              .toplinks {{ display:flex; gap:12px; flex-wrap:wrap; margin-top:18px; }}
              .toplinks a, .links a {{ text-decoration:none; color:var(--text); background:var(--panel); border:1px solid var(--line); padding:10px 14px; border-radius:12px; display:inline-block; }}
              .grid {{ display:grid; gap:18px; }}
              .card {{ display:grid; grid-template-columns:minmax(240px,320px) 1fr; gap:18px; background:rgba(20,27,45,.88); border:1px solid var(--line); border-radius:22px; overflow:hidden; box-shadow:0 10px 30px rgba(0,0,0,.2); }}
              .media {{ background:#0d1425; min-height:180px; display:flex; align-items:center; justify-content:center; }}
              .media img {{ width:100%; height:100%; object-fit:cover; display:block; }}
              .content {{ padding:20px; }}
              .heading {{ display:flex; gap:12px; align-items:center; flex-wrap:wrap; }}
              .heading h2 {{ margin:0; font-size:1.5rem; }}
              .badge {{ font-size:.8rem; padding:5px 10px; border-radius:999px; border:1px solid var(--line); }}
              .badge.community {{ color:#b7d4ff; }}
              .badge.official {{ color:#b9f3c1; }}
              .author {{ color:var(--muted); margin:.35rem 0 1rem; }}
              .tags {{ display:flex; flex-wrap:wrap; gap:8px; margin:14px 0 16px; }}
              .tag {{ background:#0d1425; border:1px solid var(--line); border-radius:999px; padding:6px 10px; color:#c7d2e6; font-size:.85rem; }}
              .links {{ display:flex; gap:10px; flex-wrap:wrap; }}
              .empty {{ background:rgba(20,27,45,.88); border:1px dashed var(--line); padding:24px; border-radius:18px; color:var(--muted); }}
              footer {{ margin-top:32px; color:var(--muted); font-size:.95rem; }}
              @media (max-width: 780px) {{ .card {{ grid-template-columns:1fr; }} .media {{ min-height:220px; }} }}
            </style>
          </head>
          <body>
            <div class="wrap">
              <header>
                <img class="brand" src="assets/branding/Preview.png" alt="CastleForge Community Mods">
                <h1>CastleForge Community Mods</h1>
                <p class="lead">Third-party CastleForge mods curated through the community catalog. Each entry links back to its README, source repository, and releases when available.</p>
                <div class="toplinks">
                  <a href="{REPO}">Repository</a>
                  <a href="{REPO}/blob/{REF}/CONTRIBUTING.md">Contributing</a>
                  <a href="{REPO}/blob/{REF}/{index_label}/mods.json">Raw index</a>
                </div>
              </header>
              <main class="grid">{body}</main>
              <footer>Generated automatically from <code>{index_label}/mods.json</code> and each mod's <code>mod.json</code>.</footer>
            </div>
          </body>
          </html>
          """

          (SITE / 'index.html').write_text(html_text, encoding='utf-8')
          (SITE / '.nojekyll').write_text('', encoding='utf-8')
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4