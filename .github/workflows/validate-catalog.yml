name: Validate Catalog

on:
  push:
    branches: [ main, master ]
    paths:
      - 'Mods/**'
      - 'mods/**'
      - 'TexturePacks/**'
      - 'texturepacks/**'
      - 'WeaponAddons/**'
      - 'weaponaddons/**'
      - 'WorldGen/**'
      - 'worldgen/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - '.github/workflows/validate-catalog.yml'
  pull_request:
    paths:
      - 'Mods/**'
      - 'mods/**'
      - 'TexturePacks/**'
      - 'texturepacks/**'
      - 'WeaponAddons/**'
      - 'weaponaddons/**'
      - 'WorldGen/**'
      - 'worldgen/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - '.github/workflows/validate-catalog.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate folder-driven catalog structure and metadata
        shell: bash
        run: |
          python <<'PY'
          import json
          import re
          import sys
          from pathlib import Path

          ROOT = Path('.')
          PREVIEW_EXTS = {'.png', '.gif', '.jpg', '.jpeg', '.webp'}
          SLUG_RE = re.compile(r'^[a-z0-9]+(?:-[a-z0-9]+)*$')

          errors = []
          warnings = []

          CATEGORY_CONFIG = {
              'mod': {'preferred': 'Mods', 'alternate': 'mods', 'label': 'Mods'},
              'texture-pack': {'preferred': 'TexturePacks', 'alternate': 'texturepacks', 'label': 'TexturePacks'},
              'weapon-addon': {'preferred': 'WeaponAddons', 'alternate': 'weaponaddons', 'label': 'WeaponAddons'},
              'world-gen': {'preferred': 'WorldGen', 'alternate': 'worldgen', 'label': 'World Gen'},
          }

          REQUIRED_KEYS = {
              'name', 'slug', 'category', 'author', 'summary', 'game_version', 'castleforge_version',
              'license', 'source_repo', 'releases_url', 'readme_path', 'preview_path', 'tags', 'official'
          }

          OPTIONAL_ARRAY_KEYS = {'maintainers', 'dependencies', 'conflicts'}

          def rel(path: Path) -> str:
              return path.as_posix()

          def add_error(message: str) -> None:
              errors.append(message)
              print(f"::error::{message}")

          def add_warning(message: str) -> None:
              warnings.append(message)
              print(f"::warning::{message}")

          def choose_existing_dir(preferred: str, alternate: str):
              preferred_path = ROOT / preferred
              alternate_path = ROOT / alternate

              preferred_exists = preferred_path.exists()
              alternate_exists = alternate_path.exists()

              if preferred_exists and alternate_exists:
                  add_error(f"Both '{preferred}/' and '{alternate}/' exist. Keep only one casing.")
                  return preferred_path

              if preferred_exists:
                  return preferred_path
              if alternate_exists:
                  return alternate_path
              return preferred_path

          def load_json(path: Path):
              try:
                  return json.loads(path.read_text(encoding='utf-8'))
              except FileNotFoundError:
                  add_error(f"Missing required file: {rel(path)}")
              except json.JSONDecodeError as exc:
                  add_error(f"Invalid JSON in {rel(path)}: {exc}")
              return None

          def find_preview(entry_dir: Path):
              candidates = [
                  p for p in sorted(entry_dir.iterdir())
                  if p.is_file() and p.suffix.lower() in PREVIEW_EXTS and p.stem.lower() == 'preview'
              ]
              return candidates[0] if candidates else None

          category_roots = {
              category: choose_existing_dir(cfg['preferred'], cfg['alternate'])
              for category, cfg in CATEGORY_CONFIG.items()
          }

          seen_names = set()
          seen_slugs = set()
          found_any_entries = False

          for category, root in category_roots.items():
              if not root.exists():
                  continue
              if not root.is_dir():
                  add_error(f"{root.name} exists but is not a directory")
                  continue

              for entry_dir in sorted(root.iterdir(), key=lambda p: p.name.lower()):
                  if not entry_dir.is_dir() or entry_dir.name.startswith('.') or entry_dir.name == '_template':
                      continue

                  found_any_entries = True
                  mod_json_path = entry_dir / 'mod.json'
                  readme_path = entry_dir / 'README.md'
                  preview_file = find_preview(entry_dir)

                  if not mod_json_path.is_file():
                      add_error(f"{rel(entry_dir)} is missing mod.json")
                      continue
                  if not readme_path.is_file():
                      add_error(f"{rel(entry_dir)} is missing README.md")
                  if preview_file is None:
                      add_error(f"{rel(entry_dir)} is missing preview image/gif (preview.png|gif|jpg|jpeg|webp)")

                  mod_data = load_json(mod_json_path)
                  if not isinstance(mod_data, dict):
                      continue

                  missing_keys = sorted(REQUIRED_KEYS - set(mod_data.keys()))
                  if missing_keys:
                      add_error(f"{rel(mod_json_path)} is missing keys: {', '.join(missing_keys)}")
                      continue

                  name = str(mod_data.get('name', '')).strip()
                  slug = str(mod_data.get('slug', '')).strip()
                  summary = str(mod_data.get('summary', '')).strip()
                  declared_category = str(mod_data.get('category', '')).strip()
                  declared_author = str(mod_data.get('author', '')).strip()
                  declared_game_version = str(mod_data.get('game_version', '')).strip()
                  declared_cf_version = str(mod_data.get('castleforge_version', '')).strip()
                  declared_license = str(mod_data.get('license', '')).strip()
                  declared_readme = str(mod_data.get('readme_path', '')).replace('\\', '/').strip()
                  declared_preview = str(mod_data.get('preview_path', '')).replace('\\', '/').strip()

                  if declared_category != category:
                      add_error(f"{rel(mod_json_path)} category should be '{category}', got '{declared_category}'")
                  if not name:
                      add_error(f"{rel(mod_json_path)} has an empty name")
                  if not slug:
                      add_error(f"{rel(mod_json_path)} has an empty slug")
                  elif not SLUG_RE.fullmatch(slug):
                      add_error(f"{rel(mod_json_path)} slug must be lowercase kebab-case, got '{slug}'")
                  if not summary:
                      add_error(f"{rel(mod_json_path)} has an empty summary")
                  if not declared_author:
                      add_error(f"{rel(mod_json_path)} has an empty author")
                  if not declared_game_version:
                      add_error(f"{rel(mod_json_path)} has an empty game_version")
                  if not declared_cf_version:
                      add_error(f"{rel(mod_json_path)} has an empty castleforge_version")
                  if not declared_license:
                      add_error(f"{rel(mod_json_path)} has an empty license")
                  if not isinstance(mod_data.get('tags'), list):
                      add_error(f"{rel(mod_json_path)} field 'tags' must be an array")
                  if not isinstance(mod_data.get('official'), bool):
                      add_error(f"{rel(mod_json_path)} field 'official' must be a boolean")

                  for key in OPTIONAL_ARRAY_KEYS:
                      if key in mod_data and not isinstance(mod_data.get(key), list):
                          add_error(f"{rel(mod_json_path)} field '{key}' must be an array when present")

                  if name in seen_names:
                      add_error(f"Duplicate entry name across catalog: {name}")
                  seen_names.add(name)

                  if slug in seen_slugs:
                      add_error(f"Duplicate entry slug across catalog: {slug}")
                  seen_slugs.add(slug)

                  expected_readme = f"{root.name}/{entry_dir.name}/README.md"
                  expected_preview = f"{root.name}/{entry_dir.name}/{preview_file.name}" if preview_file else None

                  if declared_readme != expected_readme:
                      add_error(f"{rel(mod_json_path)} readme_path should be '{expected_readme}', got '{declared_readme}'")
                  elif not (ROOT / declared_readme).is_file():
                      add_error(f"{rel(mod_json_path)} points to missing README file: {declared_readme}")

                  if expected_preview and declared_preview != expected_preview:
                      add_error(f"{rel(mod_json_path)} preview_path should be '{expected_preview}', got '{declared_preview}'")
                  elif declared_preview and not (ROOT / declared_preview).is_file():
                      add_error(f"{rel(mod_json_path)} points to missing preview file: {declared_preview}")

                  if entry_dir.name.lower() == '_template':
                      add_error(f"{rel(entry_dir)} uses a reserved directory name")
                  if slug == 'example-community-mod' and entry_dir.name != 'ExampleCommunityMod' and category == 'mod':
                      add_warning(f"{rel(mod_json_path)} still uses the example slug; rename it before merging")

          if not found_any_entries:
              add_warning('No catalog entries were found yet. Templates alone are allowed.')

          if errors:
              print(f"Catalog validation failed with {len(errors)} error(s).")
              sys.exit(1)

          if warnings:
              print(f"Catalog validation completed with {len(warnings)} warning(s).")
          else:
              print('Catalog validation passed.')
          PY
