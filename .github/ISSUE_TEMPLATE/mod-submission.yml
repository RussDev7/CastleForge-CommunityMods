name: Community content submission
description: Submit a third-party CastleForge mod, texture pack, or weapon addon to the community catalog.
title: "[Community Content]: "
labels:
  - mod-submission
body:
  - type: dropdown
    id: category
    attributes:
      label: Content type
      options:
        - Mod
        - Texture Pack
        - Weapon Addon
        - World Gen
    validations:
      required: true

  - type: input
    id: mod_name
    attributes:
      label: Entry name
      placeholder: MyCommunityProject
    validations:
      required: true

  - type: input
    id: author
    attributes:
      label: Author / maintainer
      placeholder: GitHub username or display name
    validations:
      required: true

  - type: input
    id: repo
    attributes:
      label: Source repository
      placeholder: https://github.com/yourname/your-project
    validations:
      required: true

  - type: input
    id: releases
    attributes:
      label: Releases / download link
      placeholder: https://github.com/yourname/your-project/releases
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What does this project do?
    validations:
      required: true

  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility
      description: Game version, CastleForge version, known conflicts, dependencies.
    validations:
      required: true

  - type: textarea
    id: licensing
    attributes:
      label: License / redistribution
      description: Confirm the listing assets and linked files can be shared.
    validations:
      required: true
